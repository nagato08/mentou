name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/nagato08/mentou

jobs:
  # ───────────────────────────────
  # 1. Qualité : lint + typecheck (gate rapide)
  #    Le build réel est validé dans le stage Docker.
  # ───────────────────────────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

  # ───────────────────────────────
  # 2. Build + push image vers GHCR
  # ───────────────────────────────
  build-push:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_GA_ID=${{ secrets.NEXT_PUBLIC_GA_ID }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────
  # 3. Déploiement sur le VPS
  # ───────────────────────────────
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd ~/apps/mentou
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u nagato08 --password-stdin
            export WEB_IMAGE=${{ env.IMAGE }}:${{ github.sha }}
            docker compose pull
            docker compose up -d
            docker image prune -f
