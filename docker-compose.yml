services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/nagato08/mentou:latest}
    container_name: site-vitrine
    restart: unless-stopped
    environment:
      CONTACT_EMAIL: ${CONTACT_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SECRET: ${ADMIN_SECRET}
      DB_PATH: /app/data/comments.db
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_WEEKLY: ${STRIPE_PRICE_WEEKLY}
      STRIPE_PRICE_MONTHLY: ${STRIPE_PRICE_MONTHLY}
      STRIPE_PRICE_EVENT_PLAYER: ${STRIPE_PRICE_EVENT_PLAYER}
      STRIPE_PRICE_EVENT_SPECTATOR: ${STRIPE_PRICE_EVENT_SPECTATOR}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    volumes:
      - comments_data:/app/data
    networks:
      - web

volumes:
  comments_data:

networks:
  web:
    external: true
